# One command brings up the whole stack on a SINGLE origin:
#   docker compose up --build
# Browser -> nginx (frontend, :8080) -> serves SPA + proxies /api -> backend -> mongo

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      # Published for local (non-Docker) backend dev against this Mongo.
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      mongo:
        condition: service_healthy
    # Not published to the host — only nginx reaches it (same-origin).
    expose:
      - "3000"
    # Hit the version-neutral /health (Mongoose ping) using node — no curl/wget
    # needed in the slim image. nginx waits for this before depending on backend.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  mongo-data:
