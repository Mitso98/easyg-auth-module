# nginx serves the built SPA AND reverse-proxies the API to the backend,
# so the browser only ever sees one origin (no CORS, cookies work).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let the client router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API: path is preserved (e.g. /api/v1/... -> backend /api/v1/...).
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
